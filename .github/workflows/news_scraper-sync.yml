name: news_scraper-sync

on:
  push:
    branches:
      - main
    paths:
      - "devops/**"
      - ".github/workflows/news_scraper-sync.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync_runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.NEWS_SCRAPER_SSH_KEY }}" > ~/.ssh/news_scraper_ci_key
          chmod 600 ~/.ssh/news_scraper_ci_key

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.NEWS_SCRAPER_SSH_PORT }}" "${{ secrets.NEWS_SCRAPER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync devops tree
        run: |
          ssh -i "$HOME/.ssh/news_scraper_ci_key" -p "${{ secrets.NEWS_SCRAPER_SSH_PORT }}" "${{ secrets.NEWS_SCRAPER_USER }}@${{ secrets.NEWS_SCRAPER_HOST }}" "mkdir -p '${{ secrets.NEWS_SCRAPER_DEPLOY_DIR }}/devops'"
          rsync -avz -e "ssh -i $HOME/.ssh/news_scraper_ci_key -p ${{ secrets.NEWS_SCRAPER_SSH_PORT }}" \
            "${GITHUB_WORKSPACE}/devops/" \
            "${{ secrets.NEWS_SCRAPER_USER }}@${{ secrets.NEWS_SCRAPER_HOST }}:${{ secrets.NEWS_SCRAPER_DEPLOY_DIR }}/devops/"

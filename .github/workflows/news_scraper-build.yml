name: news_scraper-build

on:
  push:
    branches:
      - main
    paths:
      - "apps/news_scraper/**"
      - ".github/workflows/news_scraper-build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/news_scraper
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Sync test deps
        run: uv sync --extra test --extra lint

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

  build_and_publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          IMAGE_NAME=ghcr.io/infostream-solution/sinarsolusi_news_scraper \
          IMAGE_TAG="${GITHUB_SHA}" \
          bash "${GITHUB_WORKSPACE}/devops/scripts/news_scraper.build.sh"

      - name: Publish image tag
        run: |
          SOURCE_TAG="${GITHUB_SHA}" \
          PUBLISH_TAG="${GITHUB_SHA}" \
          IMAGE_NAME=ghcr.io/infostream-solution/sinarsolusi_news_scraper \
          bash "${GITHUB_WORKSPACE}/devops/scripts/news_scraper.publish.sh"

      - name: Publish latest tag
        run: |
          SOURCE_TAG="${GITHUB_SHA}" \
          PUBLISH_TAG=latest \
          IMAGE_NAME=ghcr.io/infostream-solution/sinarsolusi_news_scraper \
          bash "${GITHUB_WORKSPACE}/devops/scripts/news_scraper.publish.sh"

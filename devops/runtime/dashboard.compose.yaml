services:
  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${ENV_FILE:-/etc/dashboard.env}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
